<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; text-align: center; background-color: #faf9f6; color: #333; }
    h2 { margin-bottom: 5px; color: #2c3e50; }
    .subtitle { font-size: 12px; color: #7f8c8d; margin-bottom: 30px; }
    
    /* Animated CSS Bonsai */
    #bonsai-canvas { height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; margin: 20px 0; position: relative; }
    .leaves { background-color: #4CAF50; border-radius: 50%; position: absolute; transition: all 1.5s ease-in-out; opacity: 0.9; box-shadow: inset -10px -10px 20px rgba(0,0,0,0.2); }
    .trunk { width: 20px; background-color: #5D4037; border-radius: 5px 5px 0 0; transition: all 1.5s ease-in-out; z-index: 2; }
    .pot { width: 80px; height: 25px; background-color: #2c3e50; border-radius: 5px 5px 15px 15px; z-index: 3; border-top: 4px solid #34495e; }

    /* Growth States */
    .state-wilted .trunk { height: 40px; background-color: #8D6E63; }
    .state-wilted .leaves { background-color: #A1887F; transform: scale(0.4) translateY(20px); }
    .state-seedling .trunk { height: 60px; }
    .state-seedling .leaves { transform: scale(0.6); }
    .state-growing .trunk { height: 90px; }
    .state-growing .leaves { transform: scale(0.8); }
    .state-flourishing .trunk { height: 110px; }
    .state-flourishing .leaves { transform: scale(1); animation: breathe 4s infinite ease-in-out; }

    /* Leaf Placements */
    .leaf-top { width: 90px; height: 90px; bottom: 80px; z-index: 1; }
    .leaf-left { width: 70px; height: 70px; bottom: 50px; left: calc(50% - 65px); z-index: 0; }
    .leaf-right { width: 75px; height: 75px; bottom: 60px; right: calc(50% - 70px); z-index: 0; }
    @keyframes breathe { 0%, 100% { transform: scale(1) translateY(0); } 50% { transform: scale(1.03) translateY(-3px); } }

    /* Text & UI Elements */
    #bonsai-status { font-weight: bold; margin-bottom: 5px; }
    #score-display { font-size: 13px; color: #7f8c8d; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; gap: 5px;}

    /* Tooltip CSS */
    .tooltip { position: relative; display: inline-block; cursor: pointer; color: #3498db; font-weight: bold; background: #e8f4f8; border-radius: 50%; width: 18px; height: 18px; line-height: 18px; text-align: center; }
    .tooltip .tooltiptext { visibility: hidden; width: 220px; background-color: #2c3e50; color: #fff; text-align: left; border-radius: 6px; padding: 10px; position: absolute; z-index: 10; bottom: 125%; left: 50%; transform: translateX(-50%); font-size: 11px; font-weight: normal; opacity: 0; transition: opacity 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
    .tooltip .tooltiptext::after { content: ""; position: absolute; top: 100%; left: 50%; margin-left: -5px; border-width: 5px; border-style: solid; border-color: #2c3e50 transparent transparent transparent; }
    .tooltip:hover .tooltiptext { visibility: visible; opacity: 1; }

    /* Gauges & Settings */
    #pressure-gauge { padding: 15px; border-radius: 8px; font-weight: bold; transition: background-color 0.3s; }
    .safe { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
    
    #settings-panel { margin-top: 30px; padding-top: 15px; border-top: 1px dashed #ccc; text-align: left; }
    .setting-label { font-size: 13px; font-weight: bold; color: #555; display: block; margin-bottom: 5px;}
    textarea { width: 100%; height: 60px; margin-bottom: 10px; padding: 5px; box-sizing: border-box; font-family: monospace; font-size: 11px;}
    input[type="number"] { width: 50px; padding: 5px; border-radius: 4px; border: 1px solid #ccc; }
    button { padding: 5px 12px; background-color: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background-color: #1a252f; }
  </style>
</head>
<body>
  <h2>ZenGrowth</h2>
  <div class="subtitle">Focus Companion</div>
  
  <div id="bonsai-canvas" class="state-growing">
    <div class="leaves leaf-left"></div>
    <div class="leaves leaf-right"></div>
    <div class="leaves leaf-top"></div>
    <div class="trunk"></div>
    <div class="pot"></div>
  </div>

  <div id="bonsai-status">Growing steadily...</div>
  
  <div id="score-display">
    Focus Energy: <span id="focus-score">50</span>/100
    <div class="tooltip">i
      <span class="tooltiptext">
        <strong>How it works:</strong><br><br>
        🌱 You start at 50 (Balanced).<br>
        📈 +2 points/min for focused work.<br>
        📉 -5 points/min on distracting sites.<br>
        ⚠️ -10 points/min for tab overload.<br><br>
        Keep your score above 80 to flourish!
      </span>
    </div>
  </div>

  <div id="pressure-gauge" class="safe">
    Open Tabs: <span id="tab-count">0</span> / <span id="display-max">8</span>
  </div>

<div id="settings-panel">
    <div style="margin-bottom: 15px;">
      <label class="setting-label">Your Top 3 Goals:</label>
      <input type="text" id="goal-1" class="goal-input" placeholder="e.g., Prep for Interview" style="width: 100%; margin-bottom: 5px; box-sizing: border-box;">
      <input type="text" id="goal-2" class="goal-input" placeholder="e.g., Build Portfolio" style="width: 100%; margin-bottom: 5px; box-sizing: border-box;">
      <input type="text" id="goal-3" class="goal-input" placeholder="e.g., Exercise 30 mins" style="width: 100%; margin-bottom: 10px; box-sizing: border-box;">
      
      <label class="setting-label">Goal Image (Your "Why"):</label>
      <input type="file" id="goal-image-input" accept="image/*" style="font-size: 11px; margin-bottom: 5px; width: 100%;">
      <img id="image-preview" style="max-width: 100%; height: auto; border-radius: 4px; display: none; margin-bottom: 10px;" />
    </div>

    <label class="setting-label">Distracting Sites (comma separated):</label>
    <textarea id="distractions-input">youtube.com, instagram.com, reddit.com, twitter.com, facebook.com, linkedin.com</textarea>
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
      <div>
        <label class="setting-label" style="display:inline;">Max Tabs:</label>
        <input type="number" id="max-tabs-input" min="1" max="50" value="8" style="width: 40px;">
      </div>
      <button id="save-btn">Save Settings</button>
    </div>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
